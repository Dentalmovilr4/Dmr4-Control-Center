<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DMR4 AI RADAR</title>
<meta name="description" content="Radar inteligente de oportunidades cripto con IA">

<style>
body {
    background: radial-gradient(circle, #050505, #000);
    color: #00ff99;
    font-family: monospace;
    text-align: center;
}

/* CONTENEDOR */
.container {
    margin-top: 40px;
    border: 2px solid #00ff99;
    display: inline-block;
    padding: 25px;
    box-shadow: 0 0 25px #00ff99;
    border-radius: 12px;
    min-width: 320px;
}

/* HEADER */
h1 {
    color: #00e5ff;
    text-shadow: 0 0 15px #00e5ff;
}

.subtitle {
    color: #888;
    margin-bottom: 20px;
}

/* TARJETAS */
.coin {
    border-bottom: 1px solid #222;
    padding: 12px;
    transition: 0.3s;
}

.coin:hover {
    background: #0a0a0a;
    transform: scale(1.02);
}

/* COLORES */
.radar { color: #00ffff; }
.watch { color: #ffaa00; }
.strong { color: #00ff00; }

/* BADGES */
.badge {
    padding: 3px 8px;
    border-radius: 5px;
    margin-left: 5px;
    font-size: 12px;
}

.gem { background: purple; }
.mine { background: #0066ff; }
.normal { background: #333; }

/* ESTADO VACÍO */
.empty {
    color: #555;
    padding: 20px;
}

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #555;
}
</style>
</head>

<body>

<div class="container">
    <h1>📡 DMR4 AI RADAR</h1>
    <div class="subtitle">Detección temprana de oportunidades</div>

    <div id="coins-container">
        {{COINS}}
    </div>

    <div class="footer">
        Sistema autónomo activo 24/7
    </div>
</div>

<script>
    // 🔥 SI NO HAY DATOS → mensaje automático
    const container = document.getElementById("coins-container");

    if (!container.innerHTML.trim() || container.innerHTML.includes("{{COINS}}")) {
        container.innerHTML = "<div class='empty'>⚠️ Sin datos aún... esperando análisis</div>";
    }
</script>

</body>
</html>
