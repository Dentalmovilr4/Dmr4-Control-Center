<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DMR4 AI Miner</title>
<meta name="description" content="Sistema de minería de datos cripto con IA - DMR4">

<style>
body {
    background: radial-gradient(circle, #050505, #000);
    color: #00ff99;
    font-family: monospace;
    text-align: center;
}

/* CONTENEDOR */
.container {
    margin-top: 40px;
    border: 2px solid #00ff99;
    display: inline-block;
    padding: 25px;
    box-shadow: 0 0 20px #00ff99;
    border-radius: 10px;
}

/* HEADER */
h1 {
    color: #00e5ff;
    text-shadow: 0 0 15px #00e5ff;
}

.subtitle {
    color: #888;
    margin-bottom: 20px;
}

/* TARJETAS */
.coin {
    border-bottom: 1px solid #222;
    padding: 12px;
    transition: 0.3s;
}

.coin:hover {
    background: #0a0a0a;
    transform: scale(1.02);
}

/* COLORES */
.high { color: #00ff00; }
.medium { color: #ffaa00; }
.low { color: #ff4444; }

/* BADGES */
.badge {
    padding: 3px 8px;
    border-radius: 5px;
    margin-left: 5px;
}

.gem { background: purple; }
.mine { background: #0066ff; }
.normal { background: #333; }

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #555;
}
</style>
</head>

<body>

<div class="container">
    <h1>⛏️ DMR4 AI MINER</h1>
    <div class="subtitle">Detección automática de oportunidades cripto</div>

    <!-- 🔥 AQUÍ SE INYECTAN LOS DATOS -->
    {{COINS}}

    <div class="footer">
        Actualizado automáticamente por IA
    </div>
</div>

</body>
</html>
