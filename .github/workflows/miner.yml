name: DMR4 AI RADAR

on:
  schedule:
    - cron: '0 * * * *'  # cada hora
  workflow_dispatch:

jobs:
  run-miner:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 NECESARIO para hacer push

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'   # 🔥 más estable que 3.12

      - name: Instalar dependencias
        run: |
          pip install requests python-dotenv

      - name: Ejecutar minero
        run: python main.py
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit resultados
        run: |
          git config user.name "dmr4-bot"
          git config user.email "bot@dmr4.ai"
          git add .
          git commit -m "📡 radar update" || echo "no changes"
          git push